services:
  postgres:
    image: postgres:16.13-alpine
    container_name: brain3-postgres-dev
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - brain3_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brain3}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  brain3_dev_data:
